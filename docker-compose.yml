services:
  postgres:
    image: postgres:16-alpine
    container_name: nutricore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutricore_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nutricore_manager}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
    container_name: nutricore-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nutricore_manager}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-nutricore-docker-jwt-secret-with-32-plus-characters}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-4173},http://127.0.0.1:${FRONTEND_PORT:-4173}
      APP_SECURITY_BOOTSTRAP_ENABLED: ${APP_SECURITY_BOOTSTRAP_ENABLED:-true}
      APP_SECURITY_BOOTSTRAP_FULL_NAME: ${APP_SECURITY_BOOTSTRAP_FULL_NAME:-Alberto Vilar}
      APP_SECURITY_BOOTSTRAP_EMAIL: ${APP_SECURITY_BOOTSTRAP_EMAIL:-albertovilar1@gmail.com}
      APP_SECURITY_BOOTSTRAP_PASSWORD: ${APP_SECURITY_BOOTSTRAP_PASSWORD:-132747}
      APP_SECURITY_BOOTSTRAP_ROLE: ${APP_SECURITY_BOOTSTRAP_ROLE:-ADMIN}
      MEDIA_STORAGE_PATH: /app/storage/editorial-media
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: nutricore-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4173}:80"

volumes:
  postgres-data:
