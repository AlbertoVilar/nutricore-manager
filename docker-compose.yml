services:
  postgres:
    image: postgres:16-alpine
    container_name: nutricore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutricore_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nutricore_manager}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
    container_name: nutricore-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nutricore_manager}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-with-at-least-32-characters}
      JWT_ISSUER: ${JWT_ISSUER:-nutricore-manager}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT8H}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-4173},http://127.0.0.1:${FRONTEND_PORT:-4173},http://localhost:5173,http://127.0.0.1:5173}
      APP_SECURITY_BOOTSTRAP_ENABLED: ${APP_SECURITY_BOOTSTRAP_ENABLED:-false}
      APP_SECURITY_BOOTSTRAP_FULL_NAME: ${APP_SECURITY_BOOTSTRAP_FULL_NAME:-}
      APP_SECURITY_BOOTSTRAP_EMAIL: ${APP_SECURITY_BOOTSTRAP_EMAIL:-}
      APP_SECURITY_BOOTSTRAP_PASSWORD: ${APP_SECURITY_BOOTSTRAP_PASSWORD:-}
      APP_SECURITY_BOOTSTRAP_ROLE: ${APP_SECURITY_BOOTSTRAP_ROLE:-ADMIN}
      MEDIA_STORAGE_PATH: ${MEDIA_STORAGE_PATH:-/app/storage/editorial-media}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/public/profile > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: nutricore-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres-data:
