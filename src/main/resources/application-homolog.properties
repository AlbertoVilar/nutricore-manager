spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.media.storage-path=${MEDIA_STORAGE_PATH:/app/storage/editorial-media}
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.issuer=${JWT_ISSUER:nutricore-manager-homolog}
app.security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT8H}
app.security.bootstrap.enabled=${APP_SECURITY_BOOTSTRAP_ENABLED:false}
app.security.bootstrap.full-name=${APP_SECURITY_BOOTSTRAP_FULL_NAME:}
app.security.bootstrap.email=${APP_SECURITY_BOOTSTRAP_EMAIL:}
app.security.bootstrap.password=${APP_SECURITY_BOOTSTRAP_PASSWORD:}
app.security.bootstrap.role=${APP_SECURITY_BOOTSTRAP_ROLE:ADMIN}
