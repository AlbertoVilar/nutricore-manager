spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nutricore_manager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
app.editorial.admin-token=${EDITORIAL_ADMIN_TOKEN:nutricore-dev-editor}
app.media.storage-path=${MEDIA_STORAGE_PATH:${user.dir}/storage/editorial-media}
